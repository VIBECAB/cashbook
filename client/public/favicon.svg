<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Book spine -->
  <rect x="120" y="100" width="24" height="312" rx="4" fill="url(#accent)" opacity="0.9"/>
  <!-- Book pages -->
  <rect x="156" y="112" width="236" height="288" rx="8" fill="#f1f5f9" opacity="0.95"/>
  <rect x="156" y="112" width="236" height="288" rx="8" fill="none" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Ledger lines -->
  <line x1="180" y1="168" x2="368" y2="168" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="180" y1="208" x2="368" y2="208" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="180" y1="248" x2="368" y2="248" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="180" y1="288" x2="368" y2="288" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="180" y1="328" x2="368" y2="328" stroke="#cbd5e1" stroke-width="2"/>
  <!-- Vertical divider -->
  <line x1="300" y1="140" x2="300" y2="376" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- Income amounts (green) -->
  <circle cx="204" cy="186" r="6" fill="#10b981"/>
  <rect x="218" y="181" width="60" height="10" rx="3" fill="#10b981" opacity="0.3"/>
  <circle cx="204" cy="266" r="6" fill="#10b981"/>
  <rect x="218" y="261" width="48" height="10" rx="3" fill="#10b981" opacity="0.3"/>
  <circle cx="204" cy="346" r="6" fill="#10b981"/>
  <rect x="218" y="341" width="55" height="10" rx="3" fill="#10b981" opacity="0.3"/>
  <!-- Expense amounts (red) -->
  <circle cx="204" cy="226" r="6" fill="#ef4444"/>
  <rect x="218" y="221" width="52" height="10" rx="3" fill="#ef4444" opacity="0.3"/>
  <circle cx="204" cy="306" r="6" fill="#ef4444"/>
  <rect x="218" y="301" width="44" height="10" rx="3" fill="#ef4444" opacity="0.3"/>
  <!-- Right column numbers -->
  <rect x="312" y="181" width="44" height="10" rx="3" fill="#0ea5e9" opacity="0.4"/>
  <rect x="312" y="221" width="38" height="10" rx="3" fill="#0ea5e9" opacity="0.4"/>
  <rect x="312" y="261" width="50" height="10" rx="3" fill="#0ea5e9" opacity="0.4"/>
  <rect x="312" y="301" width="36" height="10" rx="3" fill="#0ea5e9" opacity="0.4"/>
  <rect x="312" y="341" width="42" height="10" rx="3" fill="#0ea5e9" opacity="0.4"/>
  <!-- Currency symbol overlay -->
  <text x="396" y="430" font-family="system-ui, sans-serif" font-size="120" font-weight="800" fill="url(#accent)" opacity="0.15">Rs</text>
</svg>
