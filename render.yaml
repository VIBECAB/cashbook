services:
  - type: web
    name: cashbook
    runtime: node
    plan: free
    buildCommand: npm install && cd client && npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
